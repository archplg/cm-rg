# Phase 2C configuration - extended element count (10 options instead of 5)
# Tests whether PC1+PC2 = 1.000 in our small-n cells is artifact or signal.
# Tasks: D and G with 10 options each, 2 conditions, 5 runs.
# Output: results_extended/ - separate from main results/.

experiment:
  name: archipelago_extended_elements
  description: Phase 2C - 10-option versions of D and G for PCA dimensionality test
  total_budget_usd: 80     # bumped from 25 - preflight conservative on 10-option tasks
  estimated_budget_usd: 12
  output_dir: ./results_extended
  log_dir: ./logs_extended

openrouter:
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  retries_per_call: 3
  retry_backoff_seconds: [2, 5, 15]
  request_timeout_seconds: 120

models:
  - id: anthropic/claude-opus-4.7
    fallback_id: anthropic/claude-sonnet-4.6
    family: anthropic
    short_name: M1
  - id: openai/gpt-5.5
    fallback_id: openai/gpt-5.4
    family: openai
    short_name: M2
  - id: google/gemini-3.1-pro-preview
    fallback_id: google/gemini-2.5-pro
    family: google
    short_name: M3
  - id: deepseek/deepseek-v4-pro
    fallback_id: deepseek/deepseek-v4-flash
    family: deepseek
    short_name: M4
  - id: moonshotai/kimi-k2.6
    fallback_id: moonshotai/kimi-k2.5
    family: moonshot
    short_name: M5

# Larger max_tokens because 10 elements -> longer prompts and outputs
parameters:
  free_response:
    temperature: 1.0
    max_tokens: 3000
  constructs:
    temperature: 1.0
    max_tokens: 2500    # bumped from 2000 to handle larger triad combinatorics
  ratings:
    temperature: 0.0
    max_tokens: 4000    # bumped from 2500 - rating 10 elements x ~20 constructs = 200 lines

tasks:
  - id: D
    brief_file: tasks/task_D10_brief.md
    domain: climate_adaptation_extended
    is_repeat_task: true
  - id: G
    brief_file: tasks/task_G10_brief.md
    domain: medical_triage_extended
    is_repeat_task: true

conditions:
  - id: N
    name: neutral
    system_prompt: "You are an analyst. Read the brief carefully and provide your best-reasoned recommendation."
    use_personas: false

  - id: P
    name: persona
    use_personas: true
    persona_assignment:
      D: {M1: H, M2: C, M3: Q, M4: S, M5: E}
      G: {M1: S, M2: E, M3: H, M4: C, M5: Q}

repetitions:
  base_runs_per_cell: 1
  extra_runs_for_repeat_task: 4   # 5 runs per (task, condition)

pipeline:
  n_triads_per_agent: 3
  n_elements: 10              # KEY CHANGE - 10 options instead of 5
  rating_scale: [1, 7]
  triad_assignment_strategy: balanced_random

# Pre-flight checks before running
preflight:
  verify_api_key: true
  verify_model_ids: true
  estimate_cost: true
  require_user_confirmation: true
  dry_run_mode: false
