# Phase 2L - добавляем Claude Fable 5 как M12 к 11 моделям Phase 2J.
# Цель (Вариант Б, чистый): пересчитать карту на 12 моделях и проверить,
#   двигает ли новая модель сами оси PCA (как однажды сдвинул вывод переход
#   с 5 на 11 моделей в истории проекта).
#
# Переиспользуем свободные ответы (Фаза 1) 11 моделей из results_phase2j через
# засев state.json (см. seed_state_fable.py). Это изолирует эффект Fable: 11
# ответов те же, любое смещение осей - вклад именно Fable, а не пересэмплинг.
# Фаза 1 догенерирует ТОЛЬКО Fable; Фазы 2-4 пересчитаются на 12 элементах.
#
# Запуск: 7 задач x 2 условия x 1 run = 14 ячеек x 12 моделей.
# Ожидаемая стоимость ~$18 (см. estimate_cost в preflight перед стартом).

experiment:
  name: archipelago_phase2L
  description: Phase 2L - add Claude Fable 5 (M12), recompute 12-model map
  total_budget_usd: 30           # буфер; реальный спенд ожидаем ~$18
  estimated_budget_usd: 18
  output_dir: ./results_phase2L
  log_dir: ./logs_phase2L

openrouter:
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  retries_per_call: 3
  retry_backoff_seconds: [2, 5, 15]
  request_timeout_seconds: 180

# 11 моделей Phase 2J + Fable 5 как M12
models:
  - id: anthropic/claude-opus-4.7
    fallback_id: anthropic/claude-sonnet-4.6
    family: anthropic
    short_name: M1
  - id: openai/gpt-5.5
    fallback_id: openai/gpt-5.4
    family: openai
    short_name: M2
  - id: google/gemini-3.1-pro-preview
    fallback_id: google/gemini-2.5-pro
    family: google
    short_name: M3
  - id: deepseek/deepseek-v4-pro
    fallback_id: deepseek/deepseek-v4-flash
    family: deepseek
    short_name: M4
  - id: moonshotai/kimi-k2.6
    fallback_id: moonshotai/kimi-k2.5
    family: moonshot
    short_name: M5
  - id: mistralai/mistral-large-2512
    fallback_id: mistralai/mistral-large-2411
    family: mistral
    short_name: M6
  - id: cohere/command-a
    fallback_id: cohere/command-r-plus-08-2024
    family: cohere
    short_name: M7
  - id: qwen/qwen3.7-max
    fallback_id: qwen/qwen3.6-max-preview
    family: qwen
    short_name: M8
  - id: meta-llama/llama-4-maverick
    fallback_id: meta-llama/llama-3.3-70b-instruct
    family: meta
    short_name: M9
  - id: x-ai/grok-4.20
    fallback_id: x-ai/grok-4.3
    family: xai
    short_name: M10
  - id: anthropic/claude-opus-4.8
    fallback_id: anthropic/claude-opus-4.7
    family: anthropic
    short_name: M11
  # НОВАЯ модель Phase 2L - Claude Fable 5
  # slug подтверждён в каталоге OpenRouter; тариф $10/$50 за млн вход/выход.
  - id: anthropic/claude-fable-5
    fallback_id: anthropic/claude-opus-4.8
    family: anthropic
    short_name: M12

# Параметры скопированы из Phase 2J дословно (та же среда генерации)
parameters:
  free_response:
    temperature: 1.0
    max_tokens: 3000
  constructs:
    temperature: 1.0
    max_tokens: 2500
  ratings:
    temperature: 0.0
    max_tokens: 12000

# 7 задач. domain-метки ИСПРАВЛЕНЫ по содержанию брифов (в 2J они были перепутаны:
# A стояло hiring_strategy, D - engineering_prioritization; FLAG - сверьте).
tasks:
  - id: A
    brief_file: tasks/task_A_brief.md
    domain: saas_capital_allocation     # FLAG: в 2J было hiring_strategy (не по брифу)
    is_repeat_task: true
  - id: B
    brief_file: tasks/task_B_brief.md
    domain: team_diagnostic
    is_repeat_task: true
  - id: C
    brief_file: tasks/task_C_brief.md
    domain: product_ethics_privacy
    is_repeat_task: true
  - id: D
    brief_file: tasks/task_D_brief.md
    domain: climate_adaptation          # FLAG: в 2J было engineering_prioritization
    is_repeat_task: true
  - id: E
    brief_file: tasks/task_E_brief.md
    domain: ai_governance
    is_repeat_task: true
  - id: F
    brief_file: tasks/task_F_brief.md
    domain: product_launch_strategy
    is_repeat_task: true
  - id: G
    brief_file: tasks/task_G_brief.md
    domain: medical_triage_ethics
    is_repeat_task: true

conditions:
  - id: N
    name: neutral
    system_prompt: "You are an analyst. Read the brief carefully and provide your best-reasoned recommendation."
    use_personas: false

  - id: P
    name: persona
    use_personas: true
    # Latin square 2J + строка M12 (Fable).
    # FLAG: персоны M12 подобраны балансировкой (самая редкая персона в задаче),
    # а НЕ вашим каноническим генератором квадрата. После добавления M12 баланс
    # ровный (макс 3 / мин 2 на задачу). Сверьте с вашим методом построения.
    persona_assignment:
      A:
        M1: Q
        M2: S
        M3: E
        M4: H
        M5: C
        M6: E
        M7: Q
        M8: C
        M9: H
        M10: S
        M11: H
        M12: Q   # Fable (FLAG)
      B:
        M1: S
        M2: E
        M3: H
        M4: C
        M5: Q
        M6: H
        M7: S
        M8: Q
        M9: E
        M10: C
        M11: E
        M12: Q   # Fable (FLAG)
      C:
        M1: E
        M2: H
        M3: C
        M4: Q
        M5: S
        M6: C
        M7: E
        M8: S
        M9: H
        M10: Q
        M11: H
        M12: Q   # Fable (FLAG)
      D:
        M1: H
        M2: C
        M3: Q
        M4: S
        M5: E
        M6: Q
        M7: H
        M8: E
        M9: C
        M10: S
        M11: C
        M12: Q   # Fable (FLAG)
      E:
        M1: C
        M2: Q
        M3: S
        M4: E
        M5: H
        M6: Q
        M7: C
        M8: H
        M9: S
        M10: E
        M11: Q
        M12: S   # Fable (FLAG)
      F:
        M1: Q
        M2: S
        M3: E
        M4: H
        M5: C
        M6: E
        M7: Q
        M8: C
        M9: H
        M10: S
        M11: S
        M12: Q   # Fable (FLAG)
      G:
        M1: S
        M2: E
        M3: H
        M4: C
        M5: Q
        M6: H
        M7: S
        M8: Q
        M9: E
        M10: C
        M11: E
        M12: Q   # Fable (FLAG)

repetitions:
  base_runs_per_cell: 1
  extra_runs_for_repeat_task: 0   # 7 tasks x 2 conditions x 1 run = 14 cells

pipeline:
  n_triads_per_agent: 3
  n_elements: 12               # ИЗМЕНЕНО с 11: теперь 12 моделей = 12 элементов
  rating_scale: [1, 7]
  triad_assignment_strategy: balanced_random

preflight:
  verify_api_key: true
  verify_model_ids: true
  estimate_cost: true
  require_user_confirmation: false
  dry_run_mode: false
