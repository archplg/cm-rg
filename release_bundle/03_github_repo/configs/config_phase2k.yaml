  - id: anthropic/claude-opus-4.8        # canonical slug - FIX из Phase 2J
    fallback_id: anthropic/claude-opus-4.7
    family: anthropic
    short_name: M11

parameters:
  ratings:
    temperature: 0.0
    max_tokens: 12000

# 7 задач (использовать ALL constructs and elements из Phase 2J N cells)
tasks:
  - A
  - B
  - C
  - D
  - E
  - F
  - G

# Latin square: каждая (task, model) пара получает одну персону.
# Используем те же assignments, что Phase 2J P cells - чтобы было сравнимо
