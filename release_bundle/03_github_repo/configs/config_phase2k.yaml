# Phase 2K - paired N-P design для replication 2.3x Lab>Persona finding
# на 11 моделях (вместо 5 в Phase 1).
#
# Стратегия: переиспользовать Phase 2J N cells (free_responses, constructs,
# element_mapping) и добавить ТОЛЬКО ratings под persona-промптом.
# Это даёт прямое сравнение: одна и та же модель оценивает ОДНО И ТО ЖЕ
# (тот же конструкт, тот же элемент) под N и под P. Чистая paired comparison.
#
# Цель измерения:
#   - rating_N[model, construct, element] - уже есть в Phase 2J N cells
#   - rating_P[model, construct, element] - НОВЫЕ ratings из Phase 2K
#   - Persona effect = within-model variance of (rating_N - rating_P)
#   - Lab variance = across-model variance of rating_N (уже было)
#   - Ratio = Lab / Persona, целевое значение ≈ 2.3 (replication Phase 1)
#
# Стоимость: 7 задач × 11 моделей × 1 API call = 77 calls
#            ~$0.10/call avg = ~$8-10 total. Безопасно в бюджете.
# Время:     ~30-45 минут wall clock.

experiment:
  name: archipelago_phase2k_paired
  description: Phase 2K - paired N-P replication of Lab>Persona finding on 11 models
  total_budget_usd: 20         # буфер - реальный спенд ожидаем $8-10
  estimated_budget_usd: 10
  output_dir: ./results_phase2k
  log_dir: ./logs_phase2k
  # Указываем, где брать N data для reuse
  input_phase: results_phase2j  # читаем эти cells как fixed input

openrouter:
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  retries_per_call: 3
  retry_backoff_seconds: [2, 5, 15]
  request_timeout_seconds: 180

# 11 моделей - те же, что Phase 2J
models:
