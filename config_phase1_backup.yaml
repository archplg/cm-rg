# Experiment configuration - edit before running
# All keys must remain present; values can be edited

experiment:
  name: archipelago_cross_model_v1
  description: Cross-model replication of Archipelago-for-Agents pilot
  total_budget_usd: 80    # hard stop if exceeded
  estimated_budget_usd: 45
  output_dir: ./results
  log_dir: ./logs

# OpenRouter API
openrouter:
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY    # read from environment variable
  retries_per_call: 3
  retry_backoff_seconds: [2, 5, 15]
  request_timeout_seconds: 120

# Five agent models from different families
# IDs verified against OpenRouter as of May 2026. Verify before running.
models:
  - id: anthropic/claude-opus-4.7
    fallback_id: anthropic/claude-sonnet-4.6
    family: anthropic
    short_name: M1
    notes: Anthropic frontier

  - id: openai/gpt-5.5
    fallback_id: openai/gpt-5.4
    family: openai
    short_name: M2
    notes: OpenAI frontier. May require fallback if 5.5 API not yet public.

  - id: google/gemini-3.1-pro-preview
    fallback_id: google/gemini-2.5-pro
    family: google
    short_name: M3
    notes: Google frontier. Preview status May 2026. Fallback updated 2026-05-19 from gemini-3-pro (not in catalog) to gemini-2.5-pro (stable, same Pro-tier, 1M context, $1.25/$10).

  - id: deepseek/deepseek-v4-pro
    fallback_id: deepseek/deepseek-v4-flash
    family: deepseek
    short_name: M4
    notes: Chinese frontier closed-train, different RLHF distribution

  - id: moonshotai/kimi-k2.6
    fallback_id: moonshotai/kimi-k2.5
    family: moonshot
    short_name: M5
    notes: Chinese frontier; open-weight, different training

# Generation parameters per phase
# max_tokens bumped 2026-05-20 (2nd time) after OpenRouter logs revealed
# thinking-models (kimi-k2.6, gpt-5.5, gemini-3.1-pro-preview) burn
# 600-11000 tokens on internal reasoning BEFORE producing output.
# At max_tokens=800, kimi was returning empty content (all budget spent
# on reasoning). New values give reasoning budget + actual output budget.
parameters:
  free_response:
    temperature: 1.0
    max_tokens: 3000      # was 1200; reasoning + 400-word output
  constructs:
    temperature: 1.0
    max_tokens: 2000      # was 800; reasoning + 3 structured triads
  ratings:
    temperature: 0.0
    max_tokens: 2500      # was 800; reasoning + ~75 lines of CSV ratings

# Tasks (referenced from tasks/ directory)
tasks:
  - id: A
    brief_file: tasks/task_A_brief.md
    domain: strategic_capital_allocation
  - id: B
    brief_file: tasks/task_B_brief.md
    domain: team_diagnostic
    is_repeat_task: true       # gets 3 independent runs per condition
  - id: C
    brief_file: tasks/task_C_brief.md
    domain: product_ethics

# Conditions (factorial)
conditions:
  - id: N
    name: neutral
    system_prompt: "You are an analyst. Read the brief carefully and provide your best-reasoned recommendation."
    use_personas: false

  - id: P
    name: persona
    use_personas: true
    # Latin square: which model gets which persona on which task
    persona_assignment:
      A: {M1: Q, M2: S, M3: E, M4: H, M5: C}
      B: {M1: S, M2: E, M3: H, M4: C, M5: Q}
      C: {M1: E, M2: H, M3: C, M4: Q, M5: S}

# Repetitions
repetitions:
  base_runs_per_cell: 1     # for all (task, condition) pairs
  extra_runs_for_repeat_task: 2  # additional runs for Task B per condition

# Pipeline parameters
pipeline:
  n_triads_per_agent: 3     # each agent does 3 triadic elicitations
  n_elements: 5             # 5 options per task
  rating_scale: [1, 7]
  triad_assignment_strategy: balanced_random

# Pre-flight checks before running
preflight:
  verify_api_key: true
  verify_model_ids: true    # call /models endpoint, check existence
  estimate_cost: true
  require_user_confirmation: true
  dry_run_mode: false       # set true to validate config without spending tokens
