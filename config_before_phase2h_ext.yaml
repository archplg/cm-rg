# Mini test - 1 cell for verifying write corruption is fixed
# 10 models x 1 task (B) x 1 condition (N) x 1 run = 1 cell
# Cost: ~$0.50-1, Wall time: ~30 minutes
# Output: results_minitest/

experiment:
  name: archipelago_minitest
  description: Mini test before full Phase 2H-extended - verify no write corruption
  total_budget_usd: 10
  estimated_budget_usd: 2
  output_dir: ./results_minitest
  log_dir: ./logs_minitest

openrouter:
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  retries_per_call: 3
  retry_backoff_seconds: [2, 5, 15]
  request_timeout_seconds: 180

models:
  - id: anthropic/claude-opus-4.7
    fallback_id: anthropic/claude-sonnet-4.6
    family: anthropic
    short_name: M1
  - id: openai/gpt-5.5
    fallback_id: openai/gpt-5.4
    family: openai
    short_name: M2
  - id: google/gemini-3.1-pro-preview
    fallback_id: google/gemini-2.5-pro
    family: google
    short_name: M3
  - id: deepseek/deepseek-v4-pro
    fallback_id: deepseek/deepseek-v4-flash
    family: deepseek
    short_name: M4
  - id: moonshotai/kimi-k2.6
    fallback_id: moonshotai/kimi-k2.5
    family: moonshot
    short_name: M5
  - id: mistralai/mistral-large-2512
    fallback_id: mistralai/mistral-large-2411
    family: mistral
    short_name: M6
  - id: cohere/command-a
    fallback_id: cohere/command-r-plus-08-2024
    family: cohere
    short_name: M7
  - id: qwen/qwen3.7-max
    fallback_id: qwen/qwen3.6-max-preview
    family: qwen
    short_name: M8
  - id: meta-llama/llama-4-maverick
    fallback_id: meta-llama/llama-3.3-70b-instruct
    family: meta
    short_name: M9
  - id: x-ai/grok-4.20
    fallback_id: x-ai/grok-4.3
    family: xai
    short_name: M10

parameters:
  free_response:
    temperature: 1.0
    max_tokens: 3000
  constructs:
    temperature: 1.0
    max_tokens: 2500
  ratings:
    temperature: 0.0
    max_tokens: 12000

# Single task - B (engineering, was lowest disagreement task, fast to process)
tasks:
  - id: B
    brief_file: tasks/task_B_brief.md
    domain: team_diagnostic
    is_repeat_task: false

# Single condition (no personas)
conditions:
  - id: N
    name: neutral
    system_prompt: "You are an analyst. Read the brief carefully and provide your best-reasoned recommendation."
    use_personas: false

repetitions:
  base_runs_per_cell: 1
  extra_runs_for_repeat_task: 0

pipeline:
  n_triads_per_agent: 3
  n_elements: 10
  rating_scale: [1, 7]
  triad_assignment_strategy: balanced_random

preflight:
  verify_api_key: true
  verify_model_ids: true
  estimate_cost: true
  require_user_confirmation: false
  dry_run_mode: false
