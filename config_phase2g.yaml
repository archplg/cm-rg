# Phase 2G configuration - extends Phase 1 with 5 additional runs per cell
# Target: tighten run-to-run variance estimates on 7 main tasks
# Adds runs 6-10 to existing Phase 1 (runs 1-5)
# Output: same results/ directory (--resume preserves existing 70 cells)
# Cells to add: 7 tasks x 2 conditions x 5 NEW runs = 70 NEW cells
# Estimated cost: $25-30

experiment:
  name: archipelago_phase2g_extra_runs
  description: Phase 2G - runs 6 through 10 on existing Phase 1 tasks for tighter CIs
  total_budget_usd: 100    # hard stop
  estimated_budget_usd: 30
  output_dir: ./results
  log_dir: ./logs

openrouter:
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  retries_per_call: 3
  retry_backoff_seconds: [2, 5, 15]
  request_timeout_seconds: 120

models:
  - id: anthropic/claude-opus-4.7
    fallback_id: anthropic/claude-sonnet-4.6
    family: anthropic
    short_name: M1
  - id: openai/gpt-5.5
    fallback_id: openai/gpt-5.4
    family: openai
    short_name: M2
  - id: google/gemini-3.1-pro-preview
    fallback_id: google/gemini-2.5-pro
    family: google
    short_name: M3
  - id: deepseek/deepseek-v4-pro
    fallback_id: deepseek/deepseek-v4-flash
    family: deepseek
    short_name: M4
  - id: moonshotai/kimi-k2.6
    fallback_id: moonshotai/kimi-k2.5
    family: moonshot
    short_name: M5

# Parameters: keep Phase 1 token budgets so new runs match the existing data
# (Bigger budgets would create non-comparable cells; keep apples-to-apples)
parameters:
  free_response:
    temperature: 1.0
    max_tokens: 3000
  constructs:
    temperature: 1.0
    max_tokens: 2000
  ratings:
    temperature: 0.0
    max_tokens: 2500

tasks:
  - id: A
    brief_file: tasks/task_A_brief.md
    domain: strategic_capital_allocation
    is_repeat_task: true
  - id: B
    brief_file: tasks/task_B_brief.md
    domain: team_diagnostic
    is_repeat_task: true
  - id: C
    brief_file: tasks/task_C_brief.md
    domain: product_ethics
    is_repeat_task: true
  - id: D
    brief_file: tasks/task_D_brief.md
    domain: climate_adaptation
    is_repeat_task: true
  - id: E
    brief_file: tasks/task_E_brief.md
    domain: ai_governance
    is_repeat_task: true
  - id: F
    brief_file: tasks/task_F_brief.md
    domain: product_launch_strategy
    is_repeat_task: true
  - id: G
    brief_file: tasks/task_G_brief.md
    domain: medical_triage_ethics
    is_repeat_task: true

conditions:
  - id: N
    name: neutral
    system_prompt: "You are an analyst. Read the brief carefully and provide your best-reasoned recommendation."
    use_personas: false

  - id: P
    name: persona
    use_personas: true
    # Same Latin square as Phase 1 - ensures direct comparability
    persona_assignment:
      A: {M1: Q, M2: S, M3: E, M4: H, M5: C}
      B: {M1: S, M2: E, M3: H, M4: C, M5: Q}
      C: {M1: E, M2: H, M3: C, M4: Q, M5: S}
      D: {M1: H, M2: C, M3: Q, M4: S, M5: E}
      E: {M1: C, M2: Q, M3: S, M4: E, M5: H}
      F: {M1: Q, M2: S, M3: E, M4: H, M5: C}
      G: {M1: S, M2: E, M3: H, M4: C, M5: Q}

# Repetitions - 10 runs total per (task, condition)
# --resume will skip the existing 5 runs and add 5 more (runs 6-10)
repetitions:
  base_runs_per_cell: 1
  extra_runs_for_repeat_task: 9    # 1 base + 9 extra = 10 runs per (task, cond)

pipeline:
  n_triads_per_agent: 3
  n_elements: 5
  rating_scale: [1, 7]
  triad_assignment_strategy: balanced_random

preflight:
  verify_api_key: true
  verify_model_ids: true
  estimate_cost: true
  require_user_confirmation: false   # autonomous per user preference
  dry_run_mode: false
