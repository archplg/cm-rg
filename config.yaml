# Phase 2H-extended - replication test для Cohere outlier finding
# Запускаем те же 10 моделей на 5 ОСТАВШИХСЯ задачах (B, C, E, F, G)
# Phase 2H был на задачах A и D. Цель: проверить, обобщается ли Cohere +26σ outlier
# на другие домены (engineering, privacy, governance, launch, medical triage).

experiment:
  name: archipelago_phase2h_extended
  description: Phase 2H-extended - Cohere outlier replication on 5 more tasks
  total_budget_usd: 60     # буфер - реальный спенд ожидаем $20-25
  estimated_budget_usd: 25
  output_dir: ./results_phase2h_extended
  log_dir: ./logs_phase2h_extended

openrouter:
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  retries_per_call: 3
  retry_backoff_seconds: [2, 5, 15]
  request_timeout_seconds: 180

# Те же 10 моделей что Phase 2H - direct replication
models:
  - id: anthropic/claude-opus-4.7
    fallback_id: anthropic/claude-sonnet-4.6
    family: anthropic
    short_name: M1
  - id: openai/gpt-5.5
    fallback_id: openai/gpt-5.4
    family: openai
    short_name: M2
  - id: google/gemini-3.1-pro-preview
    fallback_id: google/gemini-2.5-pro
    family: google
    short_name: M3
  - id: deepseek/deepseek-v4-pro
    fallback_id: deepseek/deepseek-v4-flash
    family: deepseek
    short_name: M4
  - id: moonshotai/kimi-k2.6
    fallback_id: moonshotai/kimi-k2.5
    family: moonshot
    short_name: M5
  - id: mistralai/mistral-large-2512
    fallback_id: mistralai/mistral-large-2411
    family: mistral
    short_name: M6
  - id: cohere/command-a
    fallback_id: cohere/command-r-plus-08-2024
    family: cohere
    short_name: M7
  - id: qwen/qwen3.7-max
    fallback_id: qwen/qwen3.6-max-preview
    family: qwen
    short_name: M8
  - id: meta-llama/llama-4-maverick
    fallback_id: meta-llama/llama-3.3-70b-instruct
    family: meta
    short_name: M9
  - id: x-ai/grok-4.20
    fallback_id: x-ai/grok-4.3
    family: xai
    short_name: M10

parameters:
  free_response:
    temperature: 1.0
    max_tokens: 3000
  constructs:
    temperature: 1.0
    max_tokens: 2500
  ratings:
    temperature: 0.0
    max_tokens: 12000   # уроки из Phase 2H - Gemini reasoning ест бюджет

# 5 задач, которых не было в Phase 2H - оставшиеся из Phase 1
tasks:
  - id: B
    brief_file: tasks/task_B_brief.md
    domain: team_diagnostic
    is_repeat_task: true
  - id: C
    brief_file: tasks/task_C_brief.md
    domain: product_ethics
    is_repeat_task: true
  - id: E
    brief_file: tasks/task_E_brief.md
    domain: ai_governance
    is_repeat_task: true
  - id: F
    brief_file: tasks/task_F_brief.md
    domain: product_launch_strategy
    is_repeat_task: true
  - id: G
    brief_file: tasks/task_G_brief.md
    domain: medical_triage_ethics
    is_repeat_task: true

conditions:
  - id: N
    name: neutral
    system_prompt: "You are an analyst. Read the brief carefully and provide your best-reasoned recommendation."
    use_personas: false

  - id: P
    name: persona
    use_personas: true
    # Same Latin square pattern as Phase 2H - rotating 5 personas across 10 models
    persona_assignment:
      B:
        M1: S    # Claude
        M2: E    # GPT
        M3: H    # Gemini
        M4: C    # DeepSeek
        M5: Q    # Kimi
        M6: H    # Mistral
        M7: S    # Cohere
        M8: Q    # Qwen
        M9: E    # Llama
        M10: C   # Grok
      C:
        M1: E    # rotate
        M2: H
        M3: C
        M4: Q
        M5: S
        M6: C
        M7: E
        M8: S
        M9: H
        M10: Q
      E:
        M1: C    # rotate
        M2: Q
        M3: S
        M4: E
        M5: H
        M6: Q
        M7: C
        M8: H
        M9: S
        M10: E
      F:
        M1: Q    # rotate (back to A pattern from Phase 1)
        M2: S
        M3: E
        M4: H
        M5: C
        M6: E
        M7: Q
        M8: C
        M9: H
        M10: S
      G:
        M1: S    # rotate
        M2: E
        M3: H
        M4: C
        M5: Q
        M6: H
        M7: S
        M8: Q
        M9: E
        M10: C

# 3 runs per (task, condition) - same as Phase 2H для direct comparison
repetitions:
  base_runs_per_cell: 1
  extra_runs_for_repeat_task: 0   # 5 tasks × 2 conditions × 3 runs = 30 cells

pipeline:
  n_triads_per_agent: 3
  n_elements: 10               # all 10 models = 10 elements
  rating_scale: [1, 7]
  triad_assignment_strategy: balanced_random

preflight:
  verify_api_key: true
  verify_model_ids: true
  estimate_cost: true
  require_user_confirmation: false
  dry_run_mode: false

# === Paper notes ===
# Hypothesis: Cohere +0.55 mean offset and PC1=+26 outlier position will replicate
#             across tasks B (engineering), C (privacy), E (governance),
#             F (product launch), G (medical triage).
# If yes -> 9/10 confidence "Cohere structural calibration drift"
# If no  -> 7/10 confidence "task-conditional outlier behavior; needs further study"
# Either way: publishable finding with appropriate framing.
