parameters:
  free_response:
    temperature: 1.0
    max_tokens: 3000
  constructs:
    temperature: 1.0
    max_tokens: 2500
  ratings:
    temperature: 0.0
    max_tokens: 12000

# 7 NEW tier-sensitive tasks
tasks:
  - id: K
    brief_file: tasks/task_K_brief.md
    domain: ma_under_regulatory_uncertainty
    tier_sensitive: high
    is_repeat_task: false
  - id: L
    brief_file: tasks/task_L_brief.md
    domain: family_business_succession
    tier_sensitive: high
    is_repeat_task: false
  - id: M
    brief_file: tasks/task_M_brief.md
    domain: pandemic_response_strategy
    tier_sensitive: medium
    is_repeat_task: false
  - id: N_task
    brief_file: tasks/task_N_brief.md
    domain: rd_portfolio_allocation
    tier_sensitive: high
    is_repeat_task: false
  - id: O
    brief_file: tasks/task_O_brief.md
    domain: crisis_communication_post_breach
    tier_sensitive: low_medium
    is_repeat_task: false
  - id: P
    brief_file: tasks/task_P_brief.md
    domain: constitutional_reform_proposal
    tier_sensitive: high
    is_repeat_task: false
  - id: Q
    brief_file: tasks/task_Q_brief.md
    domain: cross_jurisdiction_ai_regulation
    tier_sensitive: very_high
    is_repeat_task: false

conditions:
  - id: N
    name: neutral
    system_prompt: "You are an analyst. Read the brief carefully and provide your best-reasoned recommendation."
    use_personas: false
  - id: P
    name: persona
    use_personas: true
    persona_assignment: auto_latin_square

repetitions:
  default: 1
  paired_phase_2k_subset:
    enabled: true
    n_per_cell: 2

pre_flight:
  check_1_verify_slugs: required
  check_2_dry_run_single_task: required
  check_3_parser_test: required
  check_4_atomic_writes: required
  check_5_monitor_dashboard: optional_but_recommended
  check_6_auto_retry: required
  check_7_post_run_verify: required

io:
  atomic_writes: true
  verify_size_after_write: true
  keep_backup_versions: 3
  min_cell_json_size_bytes: 5000

cost:
  primary_source: usage.cost
  fallback_source: manual_pricing_calculation
  alert_if_zero_cost: true
  reconcile_with_activity_csv: true

monitoring:
  dashboard_html: ./monitor_dashboard.html
  refresh_interval_seconds: 5
  state_file: ./results_phase2l/state.json
  alert_on_provider_overspend: true
  daily_spend_check: true
