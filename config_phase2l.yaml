# Phase 2L - Tier-aware CM-RG experiment (v2 after catalog search)
# 12 providers x 3 tiers = 36 models (was 39 with IBM; IBM Granite dropped - only 2 slugs in catalog, no tier separation)
# 7 new tier-sensitive tasks (K through Q)
# All pre-flight checks enabled
#
# v2 changes after Check 1 + catalog search (2026-06-07):
#   - Anthropic / OpenAI / Meta: unchanged (passed Check 1 with fallbacks)
#   - Google: switched to gen 2.5 for in-generation consistency
#   - Mistral: ministral-3b-2512 / mistral-small-2603 / mistral-medium-3-5
#   - xAI: grok-build-0.1 / grok-4.3 / grok-4.20-multi-agent
#   - Qwen: qwen-2.5-7b-instruct / qwen-plus / qwen3.7-max
#   - DeepSeek: deepseek-v4-flash / deepseek-chat-v3.1 / deepseek-v4-pro
#   - z-ai/Zhipu: glm-4-32b / glm-4.5-air / glm-5.1
#   - NVIDIA: nemotron-nano-9b-v2 / llama-3.3-nemotron-super-49b-v1.5 / nemotron-3-ultra-550b-a55b
#   - Moonshot: kimi-k2.5 / kimi-k2-thinking / kimi-k2.6
#   - Cohere: command-r7b-12-2024 / command-r-08-2024 / command-a
#   - IBM Granite: DROPPED (only 2 slugs, no tier separation)
#
# IMPORTANT: rerun verify_phase2l_slugs.py before any real spend to confirm all 36 slugs.

experiment:
  name: archipelago_phase2l
  description: Phase 2L v2 - 36 models across 3 tiers, 7 tier-sensitive advisory tasks
  total_budget_usd: 120
  estimated_budget_usd: 90
  output_dir: ./results_phase2l
  log_dir: ./logs_phase2l
  state_file: ./results_phase2l/state.json
  spend_cap_per_provider_usd: 15

openrouter:
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  retries_per_call: 3
  retry_backoff_seconds: [10, 30, 90]
  request_timeout_seconds: 240
  parser_validation: strict

# 36 candidate models, 3-tier matrix.
models:
  # === Anthropic ===
  - id: anthropic/claude-haiku-4.5
    fallback_id: anthropic/claude-haiku-4.0
